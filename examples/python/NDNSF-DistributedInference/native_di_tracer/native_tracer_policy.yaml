# Minimal native distributed-inference tracer policy with Qwen-derived ONNX stages.
#
# This is intentionally smaller than the YOLO 2x2 demo but keeps the same shape
# expected by generated-plan C++ tests:
#   /Backbone -> /Head/Shard/0, /Head/Shard/1 -> /Merge -> final-response
application: native-di-tracer
controller: /NDNSF-DI/Tracer/controller
group: /NDNSF-DI/Tracer/group

runtime:
  user_identity: /NDNSF-DI/Tracer/user
  provider_prefix: /NDNSF-DI/Tracer/provider

trust:
  app_roots:
    - /NDNSF-DI/Tracer

artifact_security:
  allowlist: []
  sandbox:
    kind: ""

authorization_summary:
  users:
    - identity: /NDNSF-DI/Tracer/user
      services:
        - /Inference/NativeTracer
  providers:
    - identity: /NDNSF-DI/Tracer/provider/backbone
      services:
        - service: /Inference/NativeTracer
          roles:
            - /Backbone
    - identity: /NDNSF-DI/Tracer/provider/head0
      services:
        - service: /Inference/NativeTracer
          roles:
            - /Head/Shard/0
    - identity: /NDNSF-DI/Tracer/provider/head1
      services:
        - service: /Inference/NativeTracer
          roles:
            - /Head/Shard/1
    - identity: /NDNSF-DI/Tracer/provider/merge
      services:
        - service: /Inference/NativeTracer
          roles:
            - /Merge

services:
  - name: /Inference/NativeTracer
    model: /Model/NativeTracer/Qwen2.5-0.5B-Minimal/v1
    users:
      - /NDNSF-DI/Tracer/user
    providers:
      - identity: /NDNSF-DI/Tracer/provider/backbone
        roles: [/Backbone]
      - identity: /NDNSF-DI/Tracer/provider/head0
        roles: [/Head/Shard/0]
      - identity: /NDNSF-DI/Tracer/provider/head1
        roles: [/Head/Shard/1]
      - identity: /NDNSF-DI/Tracer/provider/merge
        roles: [/Merge]
    roles:
      - /Backbone
      - /Head/Shard/0
      - /Head/Shard/1
      - /Merge
    dependencies:
      - producers: [/Backbone]
        consumers: [/Head/Shard/0]
        key_scope: backbone-to-head0
        topic_prefix: /activation
        object_name_template: "{producerProvider}/NDNSF/DI/ACTIVATION/{sessionId}/{keyScope}/{producerRole}/bundle/{sequence}"
        expected_segments: 1
        expected_bytes: 256
        tensors: [features]
      - producers: [/Backbone]
        consumers: [/Head/Shard/1]
        key_scope: backbone-to-head1
        topic_prefix: /activation
        object_name_template: "{producerProvider}/NDNSF/DI/ACTIVATION/{sessionId}/{keyScope}/{producerRole}/bundle/{sequence}"
        expected_segments: 1
        expected_bytes: 256
        tensors: [features]
      - producers: [/Head/Shard/0]
        consumers: [/Merge]
        key_scope: head0-to-merge
        topic_prefix: /activation
        object_name_template: "{producerProvider}/NDNSF/DI/ACTIVATION/{sessionId}/{keyScope}/{producerRole}/bundle/{sequence}"
        expected_segments: 1
        expected_bytes: 128
        tensors: [detections0]
      - producers: [/Head/Shard/1]
        consumers: [/Merge]
        key_scope: head1-to-merge
        topic_prefix: /activation
        object_name_template: "{producerProvider}/NDNSF/DI/ACTIVATION/{sessionId}/{keyScope}/{producerRole}/bundle/{sequence}"
        expected_segments: 1
        expected_bytes: 128
        tensors: [detections1]
    artifacts:
      - role: /Backbone
        path: artifacts/qwen-native-tracer-backbone.onnx
        artifact: /Artifact/NativeTracer/Backbone
        filename: qwen-native-tracer-backbone.onnx
        kind: model
        backend: onnxruntime
        metadata:
          sourceModel: Qwen/Qwen2.5-0.5B-Instruct
          input_tensors: images
          inputShape: 1,3,2,2
          output_tensors: features
          forceOutputBundle: true
          outputBundleScope: backbone-output
      - role: /Head/Shard/0
        path: artifacts/qwen-native-tracer-head0.onnx
        artifact: /Artifact/NativeTracer/Head0
        filename: qwen-native-tracer-head0.onnx
        kind: model
        backend: onnxruntime
        metadata:
          sourceModel: Qwen/Qwen2.5-0.5B-Instruct
          input_tensors: features
          inputShape: 1,16
          output_tensors: detections0
          outputScope.0: head0-to-merge
      - role: /Head/Shard/1
        path: artifacts/qwen-native-tracer-head1.onnx
        artifact: /Artifact/NativeTracer/Head1
        filename: qwen-native-tracer-head1.onnx
        kind: model
        backend: onnxruntime
        metadata:
          sourceModel: Qwen/Qwen2.5-0.5B-Instruct
          input_tensors: features
          inputShape: 1,16
          output_tensors: detections1
          outputScope.0: head1-to-merge
      - role: /Merge
        path: artifacts/qwen-native-tracer-merge.onnx
        artifact: /Artifact/NativeTracer/Merge
        filename: qwen-native-tracer-merge.onnx
        kind: model
        backend: onnxruntime
        metadata:
          sourceModel: Qwen/Qwen2.5-0.5B-Instruct
          input_tensors: detections0,detections1
          inputShape.0: 1,8
          inputShape.1: 1,8
          inputScope.detections0: head0-to-merge
          inputScope.detections1: head1-to-merge
          output_tensors: predictions
          outputScope.0: final-response
    input:
      codec: tensor-bundle
      fields:
        image:
          dtype: float32
          shape: [1, 3, 2, 2]
          layout: NCHW
    output:
      codec: tensor-bundle
      fields:
        predictions:
          dtype: float32
    metadata:
      modelFamily: yolo-onnx
      modelFormat: onnx
      plannerKind: yolo-detect-auto
      runtimeBackend: onnxruntime
      executionMode: native-tracer
      sourceModel: Qwen/Qwen2.5-0.5B-Instruct
      roleMetadata:
        /Backbone:
          stage: backbone
        /Head/Shard/0:
          stage: head
          shard: 0
        /Head/Shard/1:
          stage: head
          shard: 1
        /Merge:
          stage: merge
