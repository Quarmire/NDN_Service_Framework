application: distributed-repo-generic-demo
controller: /example/repo/controller
group: /example/repo/group

runtime:
  user_identity: /example/repo/user
  provider_prefix: /example/repo/provider

identities:
  user: /example/repo/user
  provider_prefix: /example/repo/provider

trust:
  app_roots:
    - /example/repo
  # Production deployments should anchor validation at the trust-root certificate.
  # anchor_file: /path/to/root.cert

artifact_security:
  allowlist: []
  sandbox:
    kind: ""

repo_control_plane:
  object_classes:
    configured-demo:
      minReplicationFactor: 2
      maxReplicationFactor: 2
      ttlMs: 12345
      repairAllowed: false
      autoDelete: true
      deletePolicy: ttl-expiry
  repair:
    # false: catalog sync only prints repair warnings.
    # true: catalog sync may execute repair actions whose target is this repo.
    auto_execute: false

services:
  - name: /NDNSF/DistributedRepo
    model: /NDNSF/DistributedRepo
    roles: []
    dependencies: []
    users:
      - /example/repo/user
      - /example/repo/provider/repoA
      - /example/repo/provider/repoB
      - /example/repo/provider/repoC
    providers:
      - identity: /example/repo/provider/repoA
        roles: []
      - identity: /example/repo/provider/repoB
        roles: []
      - identity: /example/repo/provider/repoC
        roles: []
