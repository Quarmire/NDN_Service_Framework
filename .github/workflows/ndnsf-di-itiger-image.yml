name: NDNSF-DI iTiger GPU image

# Push activation exists so a newly registered workflow can publish the first
# runtime release without storing a long-lived personal GitHub token locally.

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Immutable release ID
        required: true
        type: string
      gpu_build_base:
        description: CUDA devel base as repository@sha256:digest
        required: true
        type: string
      gpu_runtime_base:
        description: CUDA runtime base as repository@sha256:digest
        required: true
        type: string
  push:
    branches: [Experimental]
    paths:
      - .github/workflows/ndnsf-di-itiger-image.yml
      - packaging/ndnsf-di-container/oci/**
      - packaging/ndnsf-di-container/lib/release.py
      - packaging/ndnsf-di-container/schemas/oci-release.schema.json

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: spec110-gpu-release-${{ inputs.release_id || github.sha }}
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/matianxing1992/ndnsf-di
  RESULT_ROOT: results/spec110-itiger-qwen-live/release-build
  RELEASE_ID: ${{ inputs.release_id || format('spec110-runtime-{0}', github.sha) }}
  GPU_BUILD_BASE: ${{ inputs.gpu_build_base || 'nvidia/cuda@sha256:0a1cb6e7bd047a1067efe14efdf0276352d5ca643dfd77963dab1a4f05a003a4' }}
  GPU_RUNTIME_BASE: ${{ inputs.gpu_runtime_base || 'nvidia/cuda@sha256:0bb88834d973ca1b450fcc2a05333c6fe45510bee289912a5391274c351c4a4d' }}

jobs:
  build-sign-record:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Reject mutable inputs and invalid identity
        shell: bash
        env:
          BUILD_BASE: ${{ env.GPU_BUILD_BASE }}
          RUNTIME_BASE: ${{ env.GPU_RUNTIME_BASE }}
        run: |
          set -euo pipefail
          digest_ref='^[^[:space:]]+@sha256:[a-f0-9]{64}$'
          [[ "$BUILD_BASE" =~ $digest_ref ]]
          [[ "$RUNTIME_BASE" =~ $digest_ref ]]

      - name: Prepare release evidence directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RESULT_ROOT"
          printf '%s\n' \
            "workflow=${GITHUB_WORKFLOW}" \
            "runId=${GITHUB_RUN_ID}" \
            "runAttempt=${GITHUB_RUN_ATTEMPT}" \
            "sourceRevision=${GITHUB_SHA}" \
            "runUrl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            >"$RESULT_ROOT/build-context.txt"

      - name: Scan source context for secrets
        shell: bash
        run: |
          set -euo pipefail
          python3 packaging/ndnsf-di-container/oci/scripts/scan-secrets.py \
            --path packaging/ndnsf-di-container \
            --scope source \
            --output "$RESULT_ROOT/source-secret-scan.json"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable GPU image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/ndnsf-di-container/oci/Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.RELEASE_ID }}
          build-args: |
            GPU_BUILD_BASE_IMAGE=${{ env.GPU_BUILD_BASE }}
            GPU_RUNTIME_BASE_IMAGE=${{ env.GPU_RUNTIME_BASE }}
            SOURCE_REVISION=${{ github.sha }}
            RELEASE_ID=${{ env.RELEASE_ID }}
          cache-from: type=gha,scope=spec110-gpu
          cache-to: type=gha,mode=max,scope=spec110-gpu
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@v3.8.2

      - name: Make research runtime image publicly pullable
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api --method PATCH /user/packages/container/ndnsf-di \
            -f visibility=public

      - name: Sign and verify digest with GitHub OIDC identity
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign sign --yes --bundle "$RESULT_ROOT/cosign-bundle.json" "$image_ref"
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ndnsf-di-itiger-image.yml@" \
            --output json "$image_ref" >"$RESULT_ROOT/cosign-verification.json"

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ env.RESULT_ROOT }}/sbom.spdx.json

      - name: Record immutable release manifest and signature identity
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          BUILD_BASE: ${{ env.GPU_BUILD_BASE }}
          RUNTIME_BASE: ${{ env.GPU_RUNTIME_BASE }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime, hashlib, json, os
          from pathlib import Path

          root = Path(os.environ["RESULT_ROOT"])
          sha = lambda path: "sha256:" + hashlib.sha256(Path(path).read_bytes()).hexdigest()
          digest = os.environ["IMAGE_DIGEST"]
          verification = json.loads((root / "cosign-verification.json").read_text())
          if not verification:
              raise SystemExit("empty cosign verification")
          manifest = {
              "schemaVersion": "1.0",
              "releaseId": os.environ["RELEASE_ID"],
              "sourceRevision": os.environ["GITHUB_SHA"],
              "createdAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "images": {"linux-amd64-gpu": {
                  "reference": os.environ["IMAGE_REPOSITORY"] + "@" + digest,
                  "digest": digest,
                  "platform": "linux/amd64",
                  "backend": "onnxruntime-cuda",
              }},
              "buildInputs": [
                  {"path": "gpuBuildBase", "digest": os.environ["BUILD_BASE"].rsplit("@", 1)[1]},
                  {"path": "gpuRuntimeBase", "digest": os.environ["RUNTIME_BASE"].rsplit("@", 1)[1]},
                  {"path": "gpu.lock", "digest": sha("packaging/ndnsf-di-container/oci/locks/gpu.lock")},
                  {"path": "Dockerfile.gpu", "digest": sha("packaging/ndnsf-di-container/oci/Dockerfile.gpu")},
              ],
              "sbom": {"location": "sbom.spdx.json", "digest": sha(root / "sbom.spdx.json")},
              "provenance": {"builder": "github-actions/buildx", "digest": digest},
              "compatibility": {"architecture": "amd64", "cuda": "12.4", "cudnnMajor": 9},
          }
          (root / "release-manifest.json").write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n")
          signature = {
              "schemaVersion": "cosign-verification-bundle-v1",
              "verified": True,
              "imageDigest": digest,
              "issuer": "https://token.actions.githubusercontent.com",
              "subject": f"repo:{os.environ['GITHUB_REPOSITORY']}:workflow:ndnsf-di-itiger-image.yml",
              "transparencyLog": "verified-by-cosign",
              "visibility": "public",
              "authMode": "anonymous-read",
          }
          (root / "signature.json").write_text(json.dumps(signature, indent=2, sort_keys=True) + "\n")
          PY
          PYTHONPATH=packaging/ndnsf-di-container/lib python3 - <<'PY'
          from pathlib import Path
          import release
          root = Path("results/spec110-itiger-qwen-live/release-build")
          release.create_immutable_gpu_release_record(
              manifest_path=root / "release-manifest.json",
              signature_bundle_path=root / "signature.json",
              output_path=root / "runtime-release.json",
          )
          PY

      - name: Rescan release evidence and write checksums
        shell: bash
        run: |
          set -euo pipefail
          python3 packaging/ndnsf-di-container/oci/scripts/scan-secrets.py \
            --path "$RESULT_ROOT" --scope release-evidence \
            --output "$RESULT_ROOT/release-secret-scan.json"
          find "$RESULT_ROOT" -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum >"$RESULT_ROOT/SHA256SUMS"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spec110-release-build-${{ env.RELEASE_ID }}
          path: results/spec110-itiger-qwen-live/release-build/
          if-no-files-found: error
          retention-days: 90
