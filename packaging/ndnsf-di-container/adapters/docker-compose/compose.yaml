services:
  nfd:
    image: "${NDNSF_OCI_IMAGE:?digest-pinned OCI image is required}"
    command: ["nfd"]
    user: "${NDNSF_CONTAINER_UID:-65532}:${NDNSF_CONTAINER_GID:-65532}"
    environment:
      NDNSF_NFD_SOCKET: /run/nfd/nfd.sock
      NDN_CLIENT_TRANSPORT: unix:///run/nfd/nfd.sock
    volumes:
      - type: bind
        source: "${NDNSF_NFD_RUN_DIR:?host NFD run directory is required}"
        target: /run/nfd
      - type: bind
        source: "${NDNSF_PROJECT_ROOT:?project root is required}/config/nfd"
        target: /etc/ndn
        read_only: true
    ports:
      - "${NDNSF_NFD_TCP_PORT:-6363}:6363/tcp"
      - "${NDNSF_NFD_UDP_PORT:-6363}:6363/udp"
    healthcheck:
      test: ["CMD", "/usr/local/bin/ndnsf-di-container-healthcheck", "nfd"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]

  controller:
    image: "${NDNSF_OCI_IMAGE:?digest-pinned OCI image is required}"
    command:
      - controller
      - --policy-file
      - /var/lib/ndnsf-di/config/policies.conf
      - --trust-schema
      - /var/lib/ndnsf-di/config/trust-schema.conf
    user: "${NDNSF_CONTAINER_UID:-65532}:${NDNSF_CONTAINER_GID:-65532}"
    environment:
      NDNSF_NFD_SOCKET: /run/nfd/nfd.sock
      NDN_CLIENT_TRANSPORT: unix:///run/nfd/nfd.sock
      NDNSF_IDENTITY_SOURCE: /run/ndnsf-identity-source
      HOME: /run/ndnsf-keychain
    depends_on:
      nfd:
        condition: service_healthy
    volumes:
      - type: bind
        source: "${NDNSF_NFD_RUN_DIR:?host NFD run directory is required}"
        target: /run/nfd
      - type: bind
        source: "${NDNSF_IDENTITY_ROOT:?identity root is required}"
        target: /run/ndnsf-identity-source
        read_only: true
      - type: bind
        source: "${NDNSF_PROJECT_ROOT:?project root is required}"
        target: /var/lib/ndnsf-di
    healthcheck:
      test: ["CMD", "/usr/local/bin/ndnsf-di-container-healthcheck", "application"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run/ndnsf-keychain:size=16m,mode=0700,uid=${NDNSF_CONTAINER_UID:-65532},gid=${NDNSF_CONTAINER_GID:-65532}
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]

  provider:
    image: "${NDNSF_OCI_IMAGE:?digest-pinned OCI image is required}"
    command:
      - provider
      - --plan
      - /var/lib/ndnsf-di/config/native-execution-plan.json
      - --manifest
      - /var/lib/ndnsf-di/config/native-service-manifest.json
      - --serve
    user: "${NDNSF_CONTAINER_UID:-65532}:${NDNSF_CONTAINER_GID:-65532}"
    environment:
      NDNSF_NFD_SOCKET: /run/nfd/nfd.sock
      NDN_CLIENT_TRANSPORT: unix:///run/nfd/nfd.sock
      NDNSF_DI_BACKEND: onnxruntime-cpu
      NDNSF_DI_ALLOW_CPU_FALLBACK: "false"
      NDNSF_IDENTITY_SOURCE: /run/ndnsf-identity-source
      HOME: /run/ndnsf-keychain
    depends_on:
      nfd:
        condition: service_healthy
      controller:
        condition: service_healthy
    volumes:
      - type: bind
        source: "${NDNSF_NFD_RUN_DIR:?host NFD run directory is required}"
        target: /run/nfd
      - type: bind
        source: "${NDNSF_IDENTITY_ROOT:?identity root is required}"
        target: /run/ndnsf-identity-source
        read_only: true
      - type: bind
        source: "${NDNSF_PROJECT_ROOT:?project root is required}"
        target: /var/lib/ndnsf-di
    healthcheck:
      test: ["CMD", "/usr/local/bin/ndnsf-di-container-healthcheck", "application"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /var/cache/ndnsf-di:size=512m,mode=0770
      - /run/ndnsf-keychain:size=16m,mode=0700,uid=${NDNSF_CONTAINER_UID:-65532},gid=${NDNSF_CONTAINER_GID:-65532}
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
